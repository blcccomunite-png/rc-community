<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RC COMMUNITY - ADMIN PANEL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background: #05000a; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .admin-box { 
            background: linear-gradient(145deg, #11001c, #05000a); 
            border: 2px solid #bf00ff; 
            padding: 40px 30px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 400px; 
            box-shadow: 0 0 25px rgba(191, 0, 255, 0.3);
            text-align: center;
        }
        
        /* Premium Logo Styling from Main Code */
        .logo-container { width: 90px; height: 90px; margin: 0 auto 20px; border-radius: 50%; border: 3px solid #ffd700; overflow: hidden; background: #fff; box-shadow: 0 0 15px #ffd700; }
        .logo-container img { width: 100%; height: 100%; object-fit: cover; }

        h2 { color: #ffd700; text-align: center; margin-bottom: 25px; text-transform: uppercase; font-size: 20px; letter-spacing: 1.5px; text-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
        
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; color: #bf00ff; font-weight: bold; margin-bottom: 8px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        
        input { 
            width: 100%; 
            padding: 12px 15px; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(191, 0, 255, 0.5); 
            border-radius: 10px; 
            color: #fff; 
            font-size: 14px; 
            outline: none; 
            transition: 0.3s; 
        }
        input:focus { border-color: #00ffff; box-shadow: 0 0 10px rgba(0, 255, 255, 0.2); }
        
        .btn-action { 
            background: linear-gradient(90deg, #bf00ff, #8000ff); 
            color: #fff; 
            border: none; 
            padding: 14px; 
            border-radius: 10px; 
            font-weight: bold; 
            width: 100%; 
            cursor: pointer; 
            font-size: 16px; 
            letter-spacing: 1px; 
            box-shadow: 0 5px 15px rgba(191, 0, 255, 0.3); 
            transition: 0.3s; 
        }
        .btn-action:hover { transform: translateY(-2px); box-shadow: 0 7px 20px rgba(191, 0, 255, 0.5); }
        
        .status-msg { text-align: center; color: #00ff66; margin-top: 15px; font-size: 14px; display: none; font-weight: bold; text-shadow: 0 0 5px rgba(0, 255, 102, 0.5); }
        
        /* Sections control */
        #admin-content { display: none; }
    </style>
</head>
<body>

<div class="admin-box" id="admin-login">
    <div class="logo-container">
        <img src="https://i.ibb.co/pVfhR51/image.png" alt="Logo">
    </div>
    <h2>Admin Login</h2>
    <div class="form-group">
        <label>Enter Admin Password</label>
        <input type="password" id="adminPassInput" placeholder="Password input korun">
    </div>
    <button class="btn-action" onclick="checkAdminLogin()">LOGIN TO PANEL</button>
</div>

<div class="admin-box" id="admin-content">
    <div class="logo-container">
        <img src="https://i.ibb.co/pVfhR51/image.png" alt="Logo">
    </div>
    <h2>Admin Control Panel</h2>
    
    <div class="form-group">
        <label>App / Group Name</label>
        <input type="text" id="configName" placeholder="Enter app name">
    </div>
    
    <div class="form-group">
        <label>User Login Password</label>
        <input type="text" id="configPass" placeholder="Enter user password">
    </div>
    
    <div class="form-group">
        <label>Game Registration Link (iframe)</label>
        <input type="text" id="configLink" placeholder="Enter website/game url">
    </div>
    
    <button class="btn-action" onclick="saveNewConfig()">UPDATE CONFIG</button>
    
    <div class="status-msg" id="statusMsg">Settings Updated Successfully!</div>
</div>

<script>
// --- FIREBASE CONFIGURATION ---
const firebaseConfig = {
  apiKey: "AIzaSyDgveWAtkaJxOv0Rg24pbQT7vD0zK-w8g",
  authDomain: "rc-admin-penel.firebaseapp.com",
  databaseURL: "https://rc-admin-penel-default-rtdb.firebaseio.com",
  projectId: "rc-admin-penel",
  storageBucket: "rc-admin-penel.firebasestorage.app",
  messagingSenderId: "60752176456",
  appId: "1:60752176456:web:e1c43af8a536964a37651c",
  measurementId: "G-3WCXL6PXNY"
};

// Initialize Firebase
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
const database = firebase.database();

const MASTER_ADMIN_PASSWORD = "ADMIN";

const defaultConfig = {
    name: "ЁЭРСтАвЁЭРВ ЁЭРУЁЭРДЁЭРАЁЭРМ ЁЭРОЁЭРЕЁЭРЕЁЭРИЁЭРВЁЭРИЁЭРАЁЭРЛ ЁЭРЖЁЭРСЁЭРОЁЭРФЁЭРП",
    pass: "RC COMMUNITY",
    link: "https://deshclub2.com/#/register?invitationCode=43526139719"
};

// Admin Login Check
function checkAdminLogin() {
    const enteredPass = document.getElementById('adminPassInput').value.trim();
    if (enteredPass === MASTER_ADMIN_PASSWORD) {
        document.getElementById('admin-login').style.display = "none";
        document.getElementById('admin-content').style.display = "block";
        loadCurrentConfig();
    } else {
        alert("Wrong Admin Password!");
    }
}

// ফায়ারবেস থেকে কারেন্ট ডাটা লোড করে ইনপুটে বসানো
function loadCurrentConfig() {
    database.ref("global_hack_config").once("value").then((snapshot) => {
        const config = snapshot.exists() ? snapshot.val() : defaultConfig;
        document.getElementById('configName').value = config.name;
        document.getElementById('configPass').value = config.pass;
        document.getElementById('configLink').value = config.link;
    }).catch((error) => {
        // ডাটাবেজে কোনো ডাটা না থাকলে ডিফল্ট ডাটা শো করবে
        document.getElementById('configName').value = defaultConfig.name;
        document.getElementById('configPass').value = defaultConfig.pass;
        document.getElementById('configLink').value = defaultConfig.link;
    });
}

// ফায়ারবেস ডাটাবেজে নতুন ডাটা আপডেট ও সেভ করা
function saveNewConfig() {
    const updatedConfig = {
        name: document.getElementById('configName').value.trim(),
        pass: document.getElementById('configPass').value.trim(),
        link: document.getElementById('configLink').value.trim()
    };
    
    if(!updatedConfig.name || !updatedConfig.pass || !updatedConfig.link) {
        alert("Sob ghor puron korun mama!");
        return;
    }
    
    // ফায়ারবেসে ডাটা রাইট করা
    database.ref("global_hack_config").set(updatedConfig)
    .then(() => {
        const msg = document.getElementById('statusMsg');
        msg.style.display = "block";
        setTimeout(() => {
            msg.style.display = "none";
        }, 2500);
    })
    .catch((error) => {
        alert("Data save korte somossa hoyeche: " + error.message);
    });
}
</script>

</body>
</html>
